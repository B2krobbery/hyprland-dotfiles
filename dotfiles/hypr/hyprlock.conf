background {
    monitor =
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 1.3000
    brightness = 0.8000
    vibrancy = 0.2100
}

# CLOCK (big time)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255,255,255,0.9)
    font_size = 95
    font_family = JetBrainsMono Nerd Font
    position = 0, 140
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(220,220,220,0.8)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = center
}

# BATTERY
label {
    monitor =
    text = cmd[update:5000] echo "Battery: $(cat /sys/class/power_supply/BAT0/capacity)%"
    color = rgba(200,200,200,0.8)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -120
    halign = center
    valign = center
}

# PASSWORD BOX
input-field {
    monitor =
    size = 280, 55
    outline_thickness = 3
    dots_size = 0.25
    dots_spacing = 0.25
    outer_color = rgba(255,255,255,0.2)
    inner_color = rgba(0,0,0,0.45)
    font_color = rgb(220,220,220)
    fade_on_empty = false
    rounding = 12
    placeholder_text = Enter Password...
    position = 0, -220
    halign = center
    valign = center
}
